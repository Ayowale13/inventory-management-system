{# CHANGED: Toast container z-index uses CSS variable; positioned below navbar
   on mobile using top offset matching --navbar-h #}
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="toast-container position-fixed end-0 p-3" style="z-index: var(--z-toast, 1080); top: calc(var(--navbar-h, 56px) + .5rem);">
      {% for cat, msg in messages %}
        <div class="toast align-items-center text-bg-{{ cat if cat in ['success','danger','warning','info','primary'] else 'secondary' }} border-0 show"
             role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">{{ msg }}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-exclamation-triangle text-warning" style="font-size:4rem;" aria-hidden="true"></i>
  <h1 class="display-3 fw-bold mt-2">500</h1>
  <p class="text-muted mb-4">Something went wrong on our end. Please try again shortly.</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard.index') }}">
    <i class="bi bi-house me-1" aria-hidden="true"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
{% block public %}
<div class="text-center py-5">
  <h1 class="display-3 fw-bold">500</h1>
  <p class="text-muted">Internal server error.</p>
</div>
{% endblock %}

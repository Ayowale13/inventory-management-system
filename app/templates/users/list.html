{% extends 'base.html' %}{% block title %}Users{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h3>Users</h3>
  <a class="btn btn-primary" href="{{ url_for('users.create') }}"><i class="bi bi-plus"></i> New User</a></div>
<div class="card"><table class="table mb-0"><thead class="table-light">
  <tr><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th><th>Active</th><th>Actions</th></tr></thead><tbody>
  {% for u in users %}
  <tr><td>{{ u.username }}</td><td>{{ u.full_name or '-' }}</td><td>{{ u.email }}</td>
    <td><span class="badge bg-{{ 'primary' if u.is_admin else 'secondary' }}">{{ u.role }}</span></td>
    <td>{% if u.is_active %}<span class="text-success">✓</span>{% else %}<span class="text-danger">✗</span>{% endif %}</td>
    <td>
      <a class="btn btn-sm btn-outline-primary" href="{{ url_for('users.edit', uid=u.id) }}"><i class="bi bi-pencil"></i></a>
      <form method="post" class="d-inline" action="{{ url_for('users.delete', uid=u.id) }}" onsubmit="return confirm('Delete user?')">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
      </form>
    </td></tr>
  {% endfor %}
</tbody></table></div>{% endblock %}
